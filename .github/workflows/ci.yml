name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Prepare sample data
        run: |
          python - <<'PY'
          import os
          import numpy as np
          import pandas as pd

          os.makedirs("data/raw", exist_ok=True)
          n = 200
          np.random.seed(42)
          v_cols = {f"V{i}": np.random.randn(n) for i in range(1, 29)}
          df = pd.DataFrame({
              "Time": np.arange(n),
              "Amount": np.random.lognormal(mean=3, sigma=1, size=n),
              **v_cols,
              "Class": np.concatenate([np.zeros(n - 10, dtype=int), np.ones(10, dtype=int)]),
          })
          df.to_csv("data/raw/ci_creditcard.csv", index=False)
          PY

      - name: Preprocess
        run: |
          python mlops_pipeline.py --stage preprocess --input data/raw/ci_creditcard.csv --output data/processed

      - name: Train
        run: |
          python mlops_pipeline.py --stage train --config configs/train_config.yaml

      - name: Pytest
        run: |
          pytest --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
